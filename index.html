<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groww Support PM Pulsator — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0b0f1a 0%, #141b2d 50%, #1a1040 100%);
      color: #ffffff;
      overflow: hidden;
      position: relative;
    }

    .bg-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.35;
      pointer-events: none;
    }
    .bg-glow.one   { width: 500px; height: 500px; background: #00d09c; top: -150px; left: -100px; }
    .bg-glow.two   { width: 400px; height: 400px; background: #5b37f5; bottom: -120px; right: -80px; }
    .bg-glow.three { width: 300px; height: 300px; background: #f59e0b; bottom: 50px; left: 30%; opacity: 0.15; }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 680px;
      padding: 2rem;
      animation: fadeUp 1s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .image-wrapper {
      margin-bottom: 2.5rem;
    }
    .image-wrapper img {
      max-width: 380px;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .badge {
      display: inline-block;
      background: rgba(0, 208, 156, 0.15);
      border: 1px solid rgba(0, 208, 156, 0.3);
      color: #00d09c;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.4rem 1.2rem;
      border-radius: 100px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 0.75rem;
      background: linear-gradient(90deg, #ffffff 0%, #c0c7d6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 .highlight {
      background: linear-gradient(90deg, #00d09c, #5b37f5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 1.15rem;
      color: #8892a6;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      color: #8892a6;
    }
    .pulse-dot {
      width: 10px;
      height: 10px;
      background: #f59e0b;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5); }
      50%      { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
    }

    .brand {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #3d4559;
      letter-spacing: 1px;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.8rem; }
      .subtitle { font-size: 1rem; }
      .image-wrapper img { max-width: 280px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>
  <div class="bg-glow three"></div>

  <div class="container">
    <div class="image-wrapper">
      <img src="./minions-construction.png" alt="Under Construction" />
    </div>
    <div class="badge">Under Construction</div>
    <h1>
      <span class="highlight">Groww Support PM Pulsator</span><br />
      is Launching Soon
    </h1>
    <p class="subtitle">
      We're building something powerful to streamline the daily workflows of Support Product Managers. Stay tuned — big things are on the way.
    </p>
    <div class="status-bar">
      <span class="pulse-dot"></span>
      <span>Actively being built by the team</span>
    </div>
  </div>

  <div class="brand">GROWW &middot; SUPPORT PM PULSATOR</div>
</body>
</html>
